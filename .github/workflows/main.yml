name: .NET Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --no-restore --configuration Release

    - name: Run syntax check
      run: |
        echo "Syntax check completed successfully"
        echo "Project: Cybersecurity Awareness Chatbot"
        echo "Status: Build successful"

    - name: Verify files exist
      run: |
        Write-Host "Checking for required files..."
        
        if (Test-Path "Voice_Recording.wav") {
            Write-Host "✓ Voice_Recording.wav found"
        } else {
            Write-Host "✗ Voice_Recording.wav NOT found"
            exit 1
        }
        
        if (Test-Path "logo.jpeg") {
            Write-Host "✓ logo.jpeg found"
        } else {
            Write-Host "✗ logo.jpeg NOT found"
            exit 1
        }
        
        if (Test-Path "Program.cs") {
            Write-Host "✓ Program.cs found"
        } else {
            Write-Host "✗ Program.cs NOT found"
            exit 1
        }
        
        Write-Host "All required files present!"
      shell: pwsh

    - name: Display build summary
      run: |
        Write-Host "========================================="
        Write-Host "  Cybersecurity Awareness Chatbot"
        Write-Host "  CI Build - Successful"
        Write-Host "========================================="
        Write-Host "  Build Date: $(Get-Date)"
        Write-Host "  .NET Version: 6.0.x"
        Write-Host "  Status: PASSED"
        Write-Host "========================================="
      shell: pwsh
